services:
  postgres:
    #build: . #Construir contenedor usando Dockerfile presente en el directorio actual (.)
    image: postgres:latest
    container_name: postgre # Nombre del contenedor
    ports: 
      - "5432:5432" # Puerto para conectar desde tu máquina host al contenedor
    environment:
      POSTGRES_USER: Admin # Usuario de la base de datos
      POSTGRES_PASSWORD: Admin # Contraseña del usuario
      POSTGRES_DB: productos # Nombre de la base de datos
    volumes:
      - postgres_data:/var/lib/postgresql # Espacio donde los datos se conservarán, al detener el contenedor.
volumes:
  postgres_data:
    driver: local